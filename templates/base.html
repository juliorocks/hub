<!DOCTYPE html>
<html lang="pt-BR" prefix="og: https://ogp.me/ns#">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!-- ==========================================
       SEO BÁSICO, preencher por página
       ========================================== -->
  <title>{{PAGE_TITLE}} | Hub do Estudante</title>
  <meta name="description" content="{{PAGE_DESCRIPTION}}">
  <meta name="keywords" content="{{PAGE_KEYWORDS}}">
  <link rel="canonical" href="https://hub-do-estudante.com.br{{PAGE_URL}}">
  <meta name="robots" content="index, follow, max-image-preview:large">

  <!-- ==========================================
       OPEN GRAPH (Facebook, WhatsApp, LinkedIn)
       ========================================== -->
  <meta property="og:type" content="{{OG_TYPE}}">
  <meta property="og:title" content="{{PAGE_TITLE}} | Hub do Estudante">
  <meta property="og:description" content="{{PAGE_DESCRIPTION}}">
  <meta property="og:url" content="https://hub-do-estudante.com.br{{PAGE_URL}}">
  <meta property="og:image" content="{{OG_IMAGE}}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="Hub do Estudante">
  <meta property="og:locale" content="pt_BR">

  <!-- ==========================================
       TWITTER CARD
       ========================================== -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@melhores_cursos">
  <meta name="twitter:title" content="{{PAGE_TITLE}} | Hub do Estudante">
  <meta name="twitter:description" content="{{PAGE_DESCRIPTION}}">
  <meta name="twitter:image" content="{{OG_IMAGE}}">

  <!-- ==========================================
       SCHEMA.ORG, WebSite (global)
       ========================================== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Hub do Estudante",
    "url": "https://hub-do-estudante.com.br",
    "description": "Portal educacional brasileiro com guias, rankings e comparativos de cursos de graduação, pós-graduação, técnicos e livres.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://hub-do-estudante.com.br/busca/?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- ==========================================
       SCHEMA.ORG, Organization (global)
       ========================================== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Hub do Estudante",
    "url": "https://hub-do-estudante.com.br",
    "logo": "https://hub-do-estudante.com.br/assets/img/logo.svg",
    "sameAs": [
      "https://www.instagram.com/melhores_cursos",
      "https://www.facebook.com/melhores.cursos",
      "https://www.youtube.com/@melhores_cursos"
    ]
  }
  </script>

  <!-- ==========================================
       SCHEMA.ORG, BreadcrumbList (por página)
       ========================================== -->
  <!-- {{BREADCRUMB_SCHEMA}} -->

  <!-- ==========================================
       SCHEMA.ORG, Específico por tipo de página
       (Article, FAQPage, Course, etc.)
       ========================================== -->
  <!-- {{PAGE_SCHEMA}} -->

  <!-- ==========================================
       FONTES, Google Fonts
       ========================================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
  </noscript>

  <!-- ==========================================
       CSS, ordem importa: base → layout → componentes → específico → responsivo
       ========================================== -->
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <!-- {{PAGE_CSS}}, ex: article.css ou listing.css -->
  <link rel="stylesheet" href="../assets/css/responsive.css">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
  <link rel="apple-touch-icon" href="../assets/img/apple-touch-icon.png">

  <!-- Google Tag Manager -->
  <!-- GTM_HEAD_SNIPPET -->
</head>
<body class="page-wrapper">

  <!-- GTM NoScript -->
  <!-- GTM_BODY_SNIPPET -->

  <!-- ==========================================
       HEADER
       ========================================== -->
  

  <!-- ==========================================
       BREADCRUMB, inserir por página
       ========================================== -->
  <!-- {{BREADCRUMB_HTML}} -->

  <!-- ==========================================
       CONTEÚDO PRINCIPAL
       ========================================== -->
  <main class="page-content" id="main-content" role="main">
    <!-- {{MAIN_CONTENT}} -->
  </main>

  <!-- ==========================================
       NEWSLETTER CTA
       ========================================== -->
  <section class="home-section" aria-labelledby="newsletter-title">
    <div class="container">
      <div class="cta-box">
        <p class="cta-box__eyebrow">Newsletter gratuita</p>
        <h2 class="cta-box__title" id="newsletter-title">Fique por dentro das melhores oportunidades</h2>
        <p class="cta-box__subtitle">Receba semanalmente guias de cursos, bolsas e novidades do mercado educacional</p>
        <form class="cta-box__form" action="/newsletter/cadastro/" method="POST">
          <label for="newsletter-email" class="sr-only">Seu e-mail</label>
          <input
            type="email"
            id="newsletter-email"
            name="email"
            class="cta-box__input"
            placeholder="seu@email.com.br"
            required
            autocomplete="email"
          >
          <button type="submit" class="btn btn--dark btn--lg">Quero receber</button>
        </form>
      </div>
    </div>
  </section>

  <!-- ==========================================
       FOOTER
       ========================================== -->
  

  <!-- ==========================================
       JAVASCRIPT, ordem: main carrega os módulos
       ========================================== -->
  <script type="module" src="../assets/js/components-loader.js"></script>
  <script type="module" src="../assets/js/main.js"></script>
  <!-- {{PAGE_JS}}, scripts específicos por página -->

</body>
</html>
