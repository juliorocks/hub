<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo quadrado arredondado verde -->
  <rect width="64" height="64" rx="14" fill="#166534"/>
  <!-- Capelo acadêmico branco -->
  <!-- Aba do capelo (topo plano) -->
  <polygon points="32,14 58,26 32,38 6,26" fill="white"/>
  <!-- Topo da cabeça (calota) -->
  <rect x="24" y="36" width="16" height="12" rx="2" fill="white"/>
  <!-- Faixa da calota -->
  <rect x="24" y="36" width="16" height="4" rx="1" fill="#bbf7d0"/>
  <!-- Cordão lateral esquerdo -->
  <line x1="8" y1="26" x2="8" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="8" cy="41" r="2.5" fill="white"/>
</svg>
