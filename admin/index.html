<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Hub do Estudante</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="assets/admin.css">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tinymce@6/tinymce.min.js"></script>
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
</head>
<body class="admin-page">
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-logo">
        <h2>Hub Admin</h2>
      </div>
      <nav class="admin-nav">
        <button class="admin-nav__item admin-nav__item--active" data-section="articles">
          <span>📄 Artigos</span>
        </button>
        <button class="admin-nav__item" data-section="create">
          <span>➕ Novo Artigo</span>
        </button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <!-- Articles List Section -->
      <section id="articles-section" class="admin-section admin-section--active">
        <div class="admin-section__header">
          <h1>Gerenciar Artigos</h1>
          <button class="btn btn--primary" id="new-article-btn">Novo Artigo</button>
        </div>

        <div class="admin-filters">
          <input type="search" id="search-articles" class="admin-input" placeholder="Buscar por título...">
          <select id="filter-category" class="admin-input">
            <option value="">Todas as categorias</option>
            <option value="guias">Guias</option>
            <option value="enem-2026">ENEM 2026</option>
            <option value="carreiras">Carreiras</option>
            <option value="graduacao">Graduação</option>
            <option value="pos-graduacao">Pós-graduação</option>
            <option value="cursos-tecnicos">Cursos Técnicos</option>
            <option value="cursos-livres">Cursos Livres</option>
            <option value="universidades">Universidades</option>
          </select>
        </div>

        <div id="articles-list" class="articles-grid">
          <p class="loading">Carregando artigos...</p>
        </div>
      </section>

      <!-- Create/Edit Article Section -->
      <section id="create-section" class="admin-section">
        <div class="admin-section__header">
          <h1 id="form-title">Novo Artigo</h1>
          <button class="btn btn--secondary" id="close-form-btn">← Voltar</button>
        </div>

        <form id="article-form" class="article-form">
          <!-- Metadata -->
          <div class="form-group">
            <label for="article-title">Título</label>
            <input type="text" id="article-title" class="admin-input" required placeholder="Ex: EAD vale a pena?">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="article-category">Categoria</label>
              <select id="article-category" class="admin-input" required>
                <option value="">Selecionar categoria</option>
                <option value="guias">Guias</option>
                <option value="enem-2026">ENEM 2026</option>
                <option value="carreiras">Carreiras</option>
                <option value="graduacao">Graduação</option>
                <option value="pos-graduacao">Pós-graduação</option>
                <option value="cursos-tecnicos">Cursos Técnicos</option>
                <option value="cursos-livres">Cursos Livres</option>
                <option value="universidades">Universidades</option>
              </select>
            </div>

            <div class="form-group">
              <label for="article-slug">URL Slug</label>
              <input type="text" id="article-slug" class="admin-input" required placeholder="ead-vale-a-pena">
              <small>Auto-gerado a partir do título</small>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="article-badge">Badge</label>
              <input type="text" id="article-badge" class="admin-input" placeholder="Ex: Guia de Decisão">
            </div>

            <div class="form-group">
              <label for="article-badge-type">Tipo de Badge</label>
              <select id="article-badge-type" class="admin-input">
                <option value="guide">Guide (Guia)</option>
                <option value="enem">ENEM</option>
                <option value="finance">Finance (Financiamento)</option>
                <option value="job">Job (Mercado de Trabalho)</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="article-subtitle">Subtítulo/Descrição</label>
            <textarea id="article-subtitle" class="admin-input" rows="3" placeholder="Descrição breve do artigo" required></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="article-image">URL da Imagem Hero</label>
              <input type="url" id="article-image" class="admin-input" required placeholder="https://images.unsplash.com/...">
            </div>

            <div class="form-group">
              <label for="article-image-alt">Alt Text da Imagem</label>
              <input type="text" id="article-image-alt" class="admin-input" required placeholder="Descrição da imagem">
            </div>
          </div>

          <div class="form-group">
            <label for="article-image-caption">Legenda da Imagem</label>
            <input type="text" id="article-image-caption" class="admin-input" placeholder="Legenda opcional">
          </div>

          <div class="form-group">
            <label for="article-quick-answer">Resposta Rápida/Resumo</label>
            <textarea id="article-quick-answer" class="admin-input" rows="4" placeholder="Resposta direta e concisa sobre o tema" required></textarea>
          </div>

          <div class="form-group">
            <label for="article-content">Conteúdo Principal</label>
            <textarea id="article-content" class="admin-input" rows="15" placeholder="Conteúdo do artigo em HTML ou texto" required></textarea>
            <small>Você pode usar HTML ou Markdown</small>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="article-read-time">Tempo de Leitura (minutos)</label>
              <input type="number" id="article-read-time" class="admin-input" value="10" min="1">
            </div>

            <div class="form-group">
              <label for="article-date">Data de Publicação</label>
              <input type="date" id="article-date" class="admin-input" required>
            </div>
          </div>

          <div class="form-group">
            <label for="article-author">Autor</label>
            <input type="text" id="article-author" class="admin-input" value="Redação Hub do Estudante" placeholder="Nome do autor">
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn--secondary" id="cancel-btn">Cancelar</button>
            <button type="button" class="btn btn--secondary" id="download-btn" style="display:none;">⬇️ Download HTML</button>
            <button type="submit" class="btn btn--primary">Salvar Artigo</button>
            <button type="button" class="btn btn--danger" id="delete-btn" style="display:none;">Deletar</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="../assets/js/firebase-config.js"></script>
  <script src="assets/admin.js"></script>
</body>
</html>
